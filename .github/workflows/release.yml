name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p orchestrator-cli -p orchestrator-app

      - name: Strip binary
        run: |
          strip target/${{ matrix.target }}/release/aorch || true
          strip target/${{ matrix.target }}/release/orchestrator-app || true

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/aorch dist/
          cp target/${{ matrix.target }}/release/orchestrator-app dist/
          cd dist
          tar czf aorch-${{ matrix.suffix }}.tar.gz aorch orchestrator-app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aorch-${{ matrix.suffix }}
          path: dist/aorch-${{ matrix.suffix }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: actions/checkout@v4
        with:
          path: repo

      - name: Stage install script
        run: cp repo/install.sh artifacts/install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/install.sh
