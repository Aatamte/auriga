name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p auriga-cli -p auriga-app

      - name: Strip binary
        run: |
          strip target/${{ matrix.target }}/release/auriga || true
          strip target/${{ matrix.target }}/release/auriga-app || true

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/auriga dist/
          cp target/${{ matrix.target }}/release/auriga-app dist/
          cd dist
          tar czf auriga-${{ matrix.suffix }}.tar.gz auriga auriga-app

      - name: Verify tarball contents
        run: |
          mkdir -p verify
          tar xzf dist/auriga-${{ matrix.suffix }}.tar.gz -C verify
          test -x verify/auriga || (echo "auriga not executable" && exit 1)
          test -x verify/auriga-app || (echo "auriga-app not executable" && exit 1)
          ./verify/auriga version
          ./verify/auriga help
          echo "Tarball verified: both binaries present and executable"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: auriga-${{ matrix.suffix }}
          path: dist/auriga-${{ matrix.suffix }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - uses: actions/checkout@v5
        with:
          path: repo

      - name: Stage install script
        run: cp repo/install.sh artifacts/install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/install.sh
